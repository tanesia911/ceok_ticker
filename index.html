<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CEOK TICKER">
<meta name="theme-color" content="#030508">
<title>CEOK TICKER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #030508;
  --bg2:      #060b10;
  --surface:  #0a1018;
  --surface2: #0f1a26;
  --surface3: #162030;
  --border:   #1a3040;
  --border2:  #0d2535;
  --green:    #00e87a;
  --green2:   #00ff99;
  --red:      #ff2244;
  --red2:     #ff5566;
  --yellow:   #ffd000;
  --orange:   #ff7700;
  --cyan:     #00cfff;
  --purple:   #aa55ff;
  --text:     #b8f0d8;
  --text2:    #5a9070;
  --text3:    #2a5040;
  --mono:     'Share Tech Mono', monospace;
  --sans:     'Noto Sans KR', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { font-size: 14px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  padding-top: env(safe-area-inset-top);
  padding-bottom: calc(env(safe-area-inset-bottom) + 24px);
  overflow-x: hidden;
  position: relative;
}

/* scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
  pointer-events: none;
  z-index: 9998;
}

/* ─── HEADER ─────────────────────────── */
.hdr {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  position: sticky;
  top: 0;
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hdr-logo {
  font-family: var(--mono);
  font-size: 16px;
  color: var(--green);
  letter-spacing: 3px;
  text-shadow: 0 0 10px rgba(0,232,122,0.5);
}
.hdr-logo::before { content: '>_ '; color: var(--text3); }
.hdr-sub {
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 2px;
  margin-top: 2px;
  text-transform: uppercase;
}
.hdr-time {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
}

/* ─── CONTAINER ──────────────────────── */
.wrap { padding: 10px 12px; max-width: 560px; margin: 0 auto; }

/* ─── SEARCH ─────────────────────────── */
.search-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 10px;
  position: relative;
}
.search-panel::before {
  content: '[ TICKER INPUT ]';
  position: absolute;
  top: -8px; left: 10px;
  background: var(--bg);
  padding: 0 6px;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 2px;
}
.search-row { display: flex; gap: 8px; margin-bottom: 10px; }
.t-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--green);
  border-radius: 4px;
  padding: 12px 14px;
  font-size: 18px;
  font-family: var(--mono);
  letter-spacing: 3px;
  outline: none;
  text-transform: uppercase;
  min-height: 48px;
  transition: border-color 0.15s, box-shadow 0.15s;
  caret-color: var(--green);
}
.t-input::placeholder { color: var(--text3); font-size: 12px; letter-spacing: 1px; }
.t-input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 1px rgba(0,232,122,0.2), inset 0 0 12px rgba(0,232,122,0.04);
}
.btn-run {
  background: var(--green);
  color: var(--bg);
  border: none;
  border-radius: 4px;
  padding: 12px 20px;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  min-height: 48px;
  min-width: 80px;
  transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 0 12px rgba(0,232,122,0.25);
  white-space: nowrap;
}
.btn-run:active { transform: scale(0.97); }
.btn-run:disabled { opacity: 0.35; pointer-events: none; }

/* chips */
.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 3px;
  padding: 6px 10px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  min-height: 32px;
  display: flex; align-items: center;
  transition: all 0.12s;
  user-select: none;
}
.chip:active, .chip.active {
  background: rgba(0,232,122,0.1);
  border-color: var(--green);
  color: var(--green);
  text-shadow: 0 0 6px rgba(0,232,122,0.5);
}

/* ─── RESULT ─────────────────────────── */
.result { display: none; flex-direction: column; gap: 8px; }
.result.on { display: flex; }

/* ─── PRICE CARD ─────────────────────── */
.price-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  position: relative;
  overflow: hidden;
}
.price-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--topbar-color, var(--green));
  box-shadow: 0 0 8px var(--topbar-color, var(--green));
}
.price-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.price-ticker-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 3px;
  margin-bottom: 4px;
}
.price-num {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -1px;
}
.price-chg { font-size: 11px; margin-top: 4px; color: var(--text2); }
.price-right { text-align: right; }
.price-pct { font-family: var(--mono); font-size: 22px; font-weight: 700; }
.vol-row { margin-top: 4px; }
.vol-label { font-size: 9px; color: var(--text3); letter-spacing: 1px; }
.vol-num { font-family: var(--mono); font-size: 13px; }
.vol-note { font-size: 9px; color: var(--text3); }
.price-divider { height: 1px; background: var(--border2); margin: 10px 0 8px; }
/* mini bar at bottom */
.score-mini-row { display: flex; align-items: center; gap: 10px; }
.score-mini-num { font-family: var(--mono); font-size: 28px; font-weight: 700; min-width: 46px; }
.score-mini-right { flex: 1; }
.score-mini-bar { height: 5px; background: var(--surface3); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.score-mini-fill { height: 100%; border-radius: 2px; transition: width 0.6s; }
.verdict-text { font-family: var(--mono); font-size: 15px; letter-spacing: 1px; }
.verdict-sub { font-size: 10px; color: var(--text2); margin-top: 3px; font-family: var(--sans); }

/* ─── ENTRY ZONES ────────────────────── */
.entry-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
  position: relative;
}
.entry-panel::before {
  content: '[ 당일 진입 추천가 ]';
  position: absolute;
  top: -8px; left: 10px;
  background: var(--bg);
  padding: 0 6px;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 2px;
}
.entry-row { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.entry-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 4px;
  border: 1px solid transparent;
}
.entry-item.aggressive { background: rgba(0,232,122,0.05); border-color: rgba(0,232,122,0.2); }
.entry-item.standard   { background: rgba(0,207,255,0.05); border-color: rgba(0,207,255,0.15); }
.entry-item.safe       { background: rgba(170,85,255,0.05); border-color: rgba(170,85,255,0.15); }
.entry-tag {
  font-size: 9px;
  letter-spacing: 1px;
  padding: 3px 7px;
  border-radius: 3px;
  white-space: nowrap;
}
.entry-item.aggressive .entry-tag { background: rgba(0,232,122,0.15); color: var(--green); }
.entry-item.standard   .entry-tag { background: rgba(0,207,255,0.15); color: var(--cyan); }
.entry-item.safe       .entry-tag { background: rgba(170,85,255,0.15); color: var(--purple); }
.entry-price { font-family: var(--mono); font-size: 16px; font-weight: 700; flex: 1; }
.entry-item.aggressive .entry-price { color: var(--green); }
.entry-item.standard   .entry-price { color: var(--cyan); }
.entry-item.safe       .entry-price { color: var(--purple); }
.entry-reason { font-size: 10px; color: var(--text2); text-align: right; font-family: var(--sans); }

/* ─── TARGET / STOP ──────────────────── */
.ts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ts-card {
  border-radius: 4px;
  padding: 10px 12px;
  border: 1px solid transparent;
}
.ts-card.target { background: rgba(255,208,0,0.05); border-color: rgba(255,208,0,0.2); }
.ts-card.stop   { background: rgba(255,34,68,0.05);  border-color: rgba(255,34,68,0.2); }
.ts-lbl { font-size: 9px; color: var(--text3); letter-spacing: 1px; margin-bottom: 4px; }
.ts-val { font-family: var(--mono); font-size: 14px; font-weight: 700; }
.ts-card.target .ts-val { color: var(--yellow); }
.ts-card.stop   .ts-val { color: var(--red); }
.ts-pct { font-size: 10px; margin-top: 2px; color: var(--text2); }

/* ─── SECTION HEADER ─────────────────── */
.sec-hdr {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.sec-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

/* ─── INDICATOR ROWS ─────────────────── */
.ind-list { display: flex; flex-direction: column; gap: 4px; }
.ind-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
}
.ind-name {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text2);
  min-width: 90px;
  letter-spacing: 0.5px;
}
.ind-val {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  min-width: 56px;
  letter-spacing: 1px;
}
.ind-bar { flex: 1; }
.ind-bar-bg { height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.ind-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
.ind-sig {
  font-size: 10px;
  color: var(--text2);
  text-align: right;
  min-width: 100px;
  font-family: var(--sans);
}

/* ─── LEGEND CARDS ───────────────────── */
.legend-list { display: flex; flex-direction: column; gap: 6px; }
.legend-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  border-left: 3px solid var(--border);
  padding: 10px 12px;
}
.legend-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.legend-icon { font-size: 14px; flex-shrink: 0; }
.legend-name {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--text);
  flex: 1;
}
.legend-tool {
  font-size: 9px;
  color: var(--text3);
  background: var(--surface3);
  padding: 2px 7px;
  border-radius: 2px;
  letter-spacing: 0.5px;
  font-family: var(--sans);
}
/* score badge */
.legend-score-badge {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 3px;
  min-width: 48px;
  text-align: center;
  flex-shrink: 0;
}
.legend-opinion {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.7;
  font-family: var(--sans);
}

/* ─── LOADING ────────────────────────── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(3,5,8,0.88);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  backdrop-filter: blur(4px);
}
.overlay.on { display: flex; }
.load-box {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 28px 36px;
  text-align: center;
  background: var(--surface);
  min-width: 220px;
}
.load-ticker {
  font-family: var(--mono);
  font-size: 24px;
  color: var(--green);
  letter-spacing: 4px;
  text-shadow: 0 0 16px rgba(0,232,122,0.6);
  margin-bottom: 16px;
}
.load-bar-bg {
  height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 12px;
}
.load-bar-fill {
  height: 100%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  border-radius: 2px;
  animation: loadpulse 1.4s ease-in-out infinite;
}
@keyframes loadpulse {
  0%   { width: 0%; margin-left: 0; }
  50%  { width: 60%; margin-left: 20%; }
  100% { width: 0%; margin-left: 100%; }
}
.load-msg {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
}
.load-dot::after {
  content: '';
  animation: dots 1.2s steps(4, end) infinite;
}
@keyframes dots {
  0%   { content: ''; }
  25%  { content: '.'; }
  50%  { content: '..'; }
  75%  { content: '...'; }
  100% { content: ''; }
}

/* ─── TOAST ──────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(16px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  z-index: 9999;
  transition: transform 0.25s;
  white-space: nowrap;
  max-width: 90vw;
}
.toast.on { transform: translateX(-50%) translateY(0); }

/* ─── COLOR UTILS ────────────────────── */
.c-green  { color: var(--green); }
.c-red    { color: var(--red); }
.c-yellow { color: var(--yellow); }
.c-cyan   { color: var(--cyan); }
.c-muted  { color: var(--text3); }

.glow-green  { text-shadow: 0 0 8px rgba(0,232,122,0.7); }
.glow-red    { text-shadow: 0 0 8px rgba(255,34,68,0.7); }
.glow-yellow { text-shadow: 0 0 8px rgba(255,208,0,0.6); }

/* ─── MOBILE TWEAKS ──────────────────── */
@media (max-width: 400px) {
  html { font-size: 13px; }
  .price-num { font-size: 24px; }
  .price-pct { font-size: 18px; }
  .ind-sig { min-width: 80px; font-size: 9px; }
  .ind-name { min-width: 78px; }
  .legend-name { font-size: 11px; }
}
@media (max-width: 320px) {
  .ts-row { grid-template-columns: 1fr; }
}

/* ─── FOOTER ─────────────────────────── */
.footer {
  text-align: center;
  padding: 16px 0 4px;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 1px;
  line-height: 2;
  font-family: var(--mono);
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="hdr-logo">CEOK TICKER</div>
    <div class="hdr-sub">개별종목 단기 기술분석 시스템</div>
  </div>
  <div class="hdr-time" id="hdrTime">--:--:--</div>
</div>

<!-- LOADING OVERLAY -->
<div class="overlay" id="overlay">
  <div class="load-box">
    <div class="load-ticker" id="loadTicker">----</div>
    <div class="load-bar-bg"><div class="load-bar-fill"></div></div>
    <div class="load-msg">ANALYZING<span class="load-dot"></span></div>
  </div>
</div>

<div class="wrap">

  <!-- SEARCH -->
  <div class="search-panel">
    <div class="search-row">
      <input class="t-input" id="tInput" type="text" maxlength="15"
        placeholder="TQQQ / BTC"
        autocomplete="off" autocorrect="off" spellcheck="false"
        onkeydown="if(event.key==='Enter'){this.blur();run()}">
      <button class="btn-run" id="runBtn" onclick="run()">RUN</button>
    </div>
    <div class="chips" id="chips">
      <div class="chip" onclick="pick(this,'TQQQ')">TQQQ</div>
      <div class="chip" onclick="pick(this,'SQQQ')">SQQQ</div>
      <div class="chip" onclick="pick(this,'SOXL')">SOXL</div>
      <div class="chip" onclick="pick(this,'SOXS')">SOXS</div>
      <div class="chip" onclick="pick(this,'UVXY')">UVXY</div>
      <div class="chip" onclick="pick(this,'QQQ')">QQQ</div>
      <div class="chip" onclick="pick(this,'SPY')">SPY</div>
      <div class="chip" onclick="pick(this,'NVDA')">NVDA</div>
      <div class="chip" onclick="pick(this,'TSLA')">TSLA</div>
      <div class="chip" onclick="pick(this,'AAPL')">AAPL</div>
      <div class="chip" onclick="pick(this,'MSFT')">MSFT</div>
      <div class="chip" onclick="pick(this,'KRW-BTC')">BTC</div>
      <div class="chip" onclick="pick(this,'KRW-ETH')">ETH</div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result" id="result">

    <!-- 가격 + 종합점수 -->
    <div class="price-card" id="priceCard">
      <div class="price-top">
        <div>
          <div class="price-ticker-label" id="rLabel">------</div>
          <div class="price-num" id="rPrice">-</div>
          <div class="price-chg" id="rChg">-</div>
        </div>
        <div class="price-right">
          <div class="price-pct" id="rPct">-</div>
          <div class="vol-row">
            <div class="vol-label">VOL RATIO</div>
            <div class="vol-num" id="rVol">-</div>
            <div class="vol-note" id="rVolNote">-</div>
          </div>
        </div>
      </div>
      <div class="price-divider"></div>
      <div class="score-mini-row">
        <div class="score-mini-num" id="rScore">-</div>
        <div class="score-mini-right">
          <div class="score-mini-bar">
            <div class="score-mini-fill" id="rScoreBar" style="width:0%"></div>
          </div>
          <div class="verdict-text" id="rVerdict">-</div>
          <div class="verdict-sub" id="rVerdictSub">-</div>
        </div>
      </div>
    </div>

    <!-- 진입 추천가 -->
    <div class="entry-panel">
      <div class="entry-row" id="rEntryList">
        <!-- JS generated -->
      </div>
    </div>

    <!-- 목표가 / 손절 -->
    <div class="ts-row">
      <div class="ts-card target">
        <div class="ts-lbl">TARGET PRICE</div>
        <div class="ts-val" id="rTarget">-</div>
        <div class="ts-pct" id="rTargetPct">-</div>
      </div>
      <div class="ts-card stop">
        <div class="ts-lbl">STOP LOSS</div>
        <div class="ts-val" id="rStop">-</div>
        <div class="ts-pct" id="rStopPct">-</div>
      </div>
    </div>

    <!-- 기술 지표 -->
    <div>
      <div class="sec-hdr">// TECHNICAL INDICATORS</div>
      <div class="ind-list" id="rInds"></div>
    </div>

    <!-- 전설 트레이더 -->
    <div>
      <div class="sec-hdr">// LEGENDARY TRADERS</div>
      <div class="legend-list" id="rLegends"></div>
    </div>

    <div class="footer">
      DATA: STOOQ.COM / UPBIT&nbsp;&nbsp;|&nbsp;&nbsp;DAILY CANDLE BASIS<br>
      <span style="color:var(--red)">⚠ 투자 참고용 · 수익 보장 없음</span>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
'use strict';
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CLOCK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
setInterval(() => {
  document.getElementById('hdrTime').textContent =
    new Date().toLocaleTimeString('ko-KR');
}, 1000);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STOOQ CSV 파서 (US 주식 전용 — CORS 없이 직접 동작)
// stooq.com은 브라우저에서 CORS 헤더 허용
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function fetchStooq(ticker) {
  // Stooq 심볼 매핑: ^VIX → ^vix, 일반 → TQQQ.US
  const sym = ticker.startsWith('^')
    ? ticker.toLowerCase()
    : `${ticker.toLowerCase()}.us`;
  const url = `https://stooq.com/q/d/l/?s=${sym}&i=d`;
  try {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 14000);
    const r    = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const csv  = await r.text();
    if (!csv || csv.includes('No data') || csv.trim().length < 30) return null;

    const lines = csv.trim().split('\n');
    if (lines.length < 5) return null;   // 헤더 + 최소 4행

    // CSV 헤더: Date,Open,High,Low,Close,Volume
    const rows = lines.slice(1).map(line => {
      const [date, o, h, l, c, v] = line.split(',');
      return { date, o:+o, h:+h, l:+l, c:+c, v:+(v||0) };
    }).filter(d => !isNaN(d.c) && d.c > 0);

    // Stooq는 최신 날짜가 앞에 오므로 뒤집어서 오름차순 정렬
    rows.sort((a, b) => a.date < b.date ? -1 : 1);
    if (rows.length < 20) return null;

    const last = rows[rows.length - 1];
    const prev = rows[rows.length - 2];
    return {
      closes:    rows.map(d => d.c),
      highs:     rows.map(d => d.h),
      lows:      rows.map(d => d.l),
      opens:     rows.map(d => d.o),
      volumes:   rows.map(d => d.v),
      price:     last.c,
      prevClose: prev.c,
      prevHigh:  prev.h,
      prevLow:   prev.l,
      todayOpen: last.o,
      currency: 'USD',
    };
  } catch { return null; }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// YAHOO FINANCE — allorigins 단순 fallback
// (Stooq 실패 시에만 사용)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function fetchYahooFallback(ticker) {
  const endpoints = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1y`)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1y`)}`,
    `https://corsproxy.io/?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1y`)}`,
  ];
  for (const ep of endpoints) {
    try {
      const ctrl = new AbortController();
      const tid  = setTimeout(() => ctrl.abort(), 10000);
      const r    = await fetch(ep, { signal: ctrl.signal });
      clearTimeout(tid);
      if (!r.ok) continue;
      const data = await r.json();
      const res  = (typeof data==='object' && data.contents)
        ? JSON.parse(data.contents)?.chart?.result?.[0]
        : data?.chart?.result?.[0];
      if (!res) continue;
      const meta = res.meta, q = res.indicators?.quote?.[0];
      if (!q) continue;
      const n = Math.min(q.close?.length||0, q.high?.length||0, q.low?.length||0, q.volume?.length||0);
      const valid = [];
      for (let i=0;i<n;i++) {
        if (q.close[i]!=null&&q.high[i]!=null&&q.low[i]!=null&&q.volume[i]!=null)
          valid.push({c:q.close[i],h:q.high[i],l:q.low[i],o:q.open?.[i]||q.close[i],v:q.volume[i]});
      }
      if (valid.length < 20) continue;
      const last=valid[valid.length-1], prev=valid[valid.length-2];
      return {
        closes:valid.map(d=>d.c), highs:valid.map(d=>d.h), lows:valid.map(d=>d.l),
        opens:valid.map(d=>d.o),  volumes:valid.map(d=>d.v),
        price: meta.regularMarketPrice||last.c,
        prevClose:meta.previousClose||prev.c, prevHigh:prev.h, prevLow:prev.l,
        todayOpen:meta.regularMarketOpen||last.o, currency:meta.currency,
      };
    } catch { continue; }
  }
  return null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// OHLCV 조회 — 메인 라우터
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function fetchOHLCV(ticker) {
  // ── 업비트 코인 ──
  if (ticker.startsWith('KRW-')) {
    try {
      const r = await fetch(
        `https://api.upbit.com/v1/candles/days?market=${ticker}&count=250`,
        { signal: AbortSignal.timeout(10000) }
      );
      const d = await r.json();
      if (!Array.isArray(d) || d.length < 20) return null;
      const rev = [...d].reverse();
      return {
        closes:    rev.map(x => x.trade_price),
        highs:     rev.map(x => x.high_price),
        lows:      rev.map(x => x.low_price),
        volumes:   rev.map(x => x.candle_acc_trade_volume),
        price:     rev[rev.length-1].trade_price,
        prevClose: rev[rev.length-2].trade_price,
        prevHigh:  rev[rev.length-2].high_price,
        prevLow:   rev[rev.length-2].low_price,
        todayOpen: rev[rev.length-1].opening_price,
        currency: 'KRW',
      };
    } catch { return null; }
  }

  // ── 미국 주식: Stooq 우선 → Yahoo fallback ──
  const stooq = await fetchStooq(ticker);
  if (stooq) return stooq;

  // Stooq 실패 시 Yahoo Finance 시도
  const yahoo = await fetchYahooFallback(ticker);
  if (yahoo) return yahoo;

  return null;

}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 지표 계산 함수들
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcRSI(closes, p=14) {
  if (closes.length < p+2) return null;
  let g=0, l=0;
  for (let i=1;i<=p;i++) { const d=closes[i]-closes[i-1]; if(d>0) g+=d; else l-=d; }
  g/=p; l/=p;
  for (let i=p+1;i<closes.length;i++) {
    const d=closes[i]-closes[i-1];
    g=(g*(p-1)+Math.max(d,0))/p;
    l=(l*(p-1)+Math.max(-d,0))/p;
  }
  return l===0?100:100-100/(1+g/l);
}

function calcMACD(closes) {
  if (closes.length<36) return null;
  const ema=(d,p)=>{ const k=2/(p+1),r=[d[0]]; for(let i=1;i<d.length;i++) r.push(d[i]*k+r[i-1]*(1-k)); return r; };
  const e12=ema(closes,12), e26=ema(closes,26);
  const ml=e12.map((v,i)=>v-e26[i]).slice(25);
  const sl=ema(ml,9);
  const macd=ml[ml.length-1], sig=sl[sl.length-1];
  const hist=macd-sig;
  const ph=ml[ml.length-2]-sl[sl.length-2];
  return {macd,signal:sig,hist,rising:hist>ph};
}

function calcBB(closes,p=20,m=2) {
  if (closes.length<p) return null;
  const sl=closes.slice(-p);
  const ma=sl.reduce((a,b)=>a+b)/p;
  const sd=Math.sqrt(sl.reduce((a,b)=>a+(b-ma)**2)/p);
  const up=ma+m*sd, lo=ma-m*sd;
  const price=closes[closes.length-1];
  const pct=up>lo?(price-lo)/(up-lo):0.5;
  return {upper:up,lower:lo,mid:ma,price,pct};
}

function calcStoch(highs,lows,closes,kP=14,dP=3) {
  if (closes.length<kP+dP) return null;
  const kv=[];
  for (let i=closes.length-dP;i<closes.length;i++) {
    const h=Math.max(...highs.slice(i-kP+1,i+1));
    const l=Math.min(...lows.slice(i-kP+1,i+1));
    kv.push(h>l?(closes[i]-l)/(h-l)*100:50);
  }
  return {k:kv[kv.length-1], d:kv.reduce((a,b)=>a+b)/kv.length};
}

function calcWR(highs,lows,closes,p=14) {
  if (closes.length<p) return null;
  const hh=Math.max(...highs.slice(-p)), ll=Math.min(...lows.slice(-p));
  return hh>ll?(hh-closes[closes.length-1])/(hh-ll)*-100:-50;
}

function calcATR(highs,lows,closes,p=14) {
  if (closes.length<p+1) return null;
  const trs=[];
  for (let i=closes.length-p;i<closes.length;i++)
    trs.push(Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1])));
  return trs.reduce((a,b)=>a+b)/p;
}

function calcEMA(closes,p) {
  if (closes.length<p) return null;
  const k=2/(p+1);
  let e=closes.slice(0,p).reduce((a,b)=>a+b)/p;
  for (let i=p;i<closes.length;i++) e=closes[i]*k+e*(1-k);
  return e;
}

function calcVolRatio(volumes,p=20) {
  if (volumes.length<p+1) return null;
  const avg=volumes.slice(-p-1,-1).reduce((a,b)=>a+b)/p;
  return avg>0?volumes[volumes.length-1]/avg:null;
}

// ── 당일 진입 추천가 계산 ──────────────────
function calcEntryZones(ohlcv, atr, ema9, ema20, bb, finalScore) {
  const { price, prevClose, prevHigh, prevLow, todayOpen } = ohlcv;
  const isBuy = finalScore >= 0;  // 매수 관점 vs 매도관점

  // 피벗 포인트
  const pivot = (prevHigh + prevLow + prevClose) / 3;
  const s1    = 2 * pivot - prevHigh;
  const r1    = 2 * pivot - prevLow;

  let zones;
  if (isBuy) {
    // 매수 진입 3단계
    const aggressive  = price;                                    // 현재 즉시 진입
    const standard    = ema9 ? Math.min(ema9, r1 > price ? r1 * 0.998 : price * 0.997) : price * 0.997;
    const safe        = bb ? Math.max(bb.mid * 0.999, s1)        // BB 중심선 또는 S1
                           : price * 0.993;
    zones = [
      { cls:'aggressive', tag:'즉시 진입',   price: aggressive,  reason:`현재가 기준 즉시 진입` },
      { cls:'standard',   tag:'지지선 진입',  price: Math.min(standard, price), reason:`EMA9 / R1 지지 확인 후` },
      { cls:'safe',       tag:'안전 진입',   price: Math.min(safe, price),     reason:`BB 중심선 / S1 지지` },
    ];
  } else {
    // 하락 ETF (매도 관점)
    const aggressive  = price;
    const standard    = ema9 ? Math.max(ema9, s1 < price ? s1 * 1.002 : price * 1.003) : price * 1.003;
    const safe        = bb ? Math.min(bb.mid * 1.001, r1) : price * 1.007;
    zones = [
      { cls:'aggressive', tag:'즉시 진입',   price: aggressive,                 reason:`현재가 즉시 (하락 베팅)` },
      { cls:'standard',   tag:'저항선 진입',  price: Math.max(standard, price),  reason:`EMA9 / S1 저항 확인 후` },
      { cls:'safe',       tag:'안전 진입',   price: Math.max(safe, price),      reason:`BB 중심선 반등 시` },
    ];
  }
  return zones;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 종합 기술 신호 계산
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcSignal(ohlcv) {
  const {closes,highs,lows,volumes,price,prevClose} = ohlcv;

  const rsi   = calcRSI(closes);
  const macd  = calcMACD(closes);
  const bb    = calcBB(closes);
  const stoch = calcStoch(highs,lows,closes);
  const wr    = calcWR(highs,lows,closes);
  const atr   = calcATR(highs,lows,closes);
  const ema9  = calcEMA(closes,9);
  const ema20 = calcEMA(closes,20);
  const ema50 = calcEMA(closes,50);
  const ema200= calcEMA(closes,200);
  const volR  = calcVolRatio(volumes);

  const inds=[]; let tot=0, wt=0;
  const add=(name,val,sig,sc,w)=>{ inds.push({name,val,sig,sc}); tot+=sc*w; wt+=w; };

  if (rsi!=null) {
    const r=Math.round(rsi);
    const [s,sc]=r>=80?['과매수 ⚠',-2]:r>=65?['고점권',-1]:r>=55?['상승 유지',0.5]
      :r>=45?['중립',0]:r>=35?['약세',-0.5]:r>=25?['과매도 ●',1.5]:['극단 과매도 ■',2];
    add('RSI_14',r,s,sc,2.5);
  }
  if (macd) {
    const [s,sc]=macd.hist>0&&macd.rising?['HIST 상승확장 ▲',2]
      :macd.hist>0?['모멘텀 약화 ▽',0.5]
      :macd.hist<0&&!macd.rising?['HIST 하락확장 ▼',-2]
      :['하락 완화중',-0.3];
    add('MACD',macd.hist.toFixed(3),s,sc,2.5);
  }
  if (bb) {
    const p=bb.pct;
    const [s,sc]=p>=1?['상단 이탈 ⚠',-2]:p>=0.8?['상단근처',-1]:p>=0.5?['중간위',0.3]
      :p>=0.2?['중간아래',-0.3]:p>=0?['하단근처 ●',1.5]:['하단이탈 ■',2];
    add('BB_위치',(p*100).toFixed(0)+'%',s,sc,2);
  }
  if (stoch) {
    const k=Math.round(stoch.k), d=Math.round(stoch.d);
    const [s,sc]=k>=80&&k<d?['고점 하락전환',-2]:k>=80?['과매수권',-1]
      :k<=20&&k>d?['저점 상승전환',2]:k<=20?['과매도권 ●',1.5]:['중립',0];
    add('STOCH',`K:${k} D:${d}`,s,sc,1.5);
  }
  if (wr!=null) {
    const w=Math.round(wr);
    const [s,sc]=w>=-20?['과매수 ⚠',-1.5]:w>=-40?['고점권',-0.5]:w>=-60?['중립',0]
      :w>=-80?['저점권 ●',0.5]:['극단과매도 ■',1.5];
    add('%R',w,s,sc,1.5);
  }
  if (ema9&&ema20&&ema50) {
    const allUp=price>ema9&&ema9>ema20&&ema20>ema50;
    const allDn=price<ema9&&ema9<ema20&&ema20<ema50;
    const ab200=ema200!=null?price>ema200:null;
    const vs20=((price-ema20)/ema20*100).toFixed(1);
    const ma200t=ema200?` 200MA:${((price-ema200)/ema200*100).toFixed(1)}%`:'';
    const [s,sc]=allUp&&ab200===true?['완벽정배열+200MA▲',2]
      :allUp&&ab200===false?['정배열 200MA↓',1.2]:allUp?['완벽 정배열',1.8]
      :price>ema20?['단기 상승',1]:price>ema50?['중기선 위',0.5]
      :allDn&&ab200===false?['역배열+200MA↓',-2]:allDn?['완전 역배열',-1.8]:['하락국면',-1];
    add('EMA 추세',`MA20:${vs20}%${ma200t}`,s,sc,2.5);
  }
  if (volR!=null) {
    const up=price>=prevClose;
    const [s,sc]=volR>=2&&up?['폭발+상승 ■',2]:volR>=1.5&&up?['급증 상승 ▲',1.5]
      :volR>=2&&!up?['폭발+하락 ▼',-2]:volR>=1.5&&!up?['급증 하락 ▼',-1.5]
      :volR>=1.2?[up?'평균이상 매수':'평균이상 매도',up?0.5:-0.5]:['거래량 부족',0];
    add('VOL_RATIO',`${volR.toFixed(1)}x`,s,sc,1.5);
  }

  const finalScore = wt>0?tot/wt:0;  // -2 ~ +2
  const norm       = Math.round((finalScore+2)/4*100); // 0~100

  let verdict,verdictColor,verdictSub;
  if      (finalScore>= 1.5) { verdict='🔥 STRONG BUY'; verdictColor='var(--green2)'; verdictSub='대부분 지표 매수 신호'; }
  else if (finalScore>= 0.8) { verdict='📈 BUY';        verdictColor='var(--green)';  verdictSub='매수 지표 우세'; }
  else if (finalScore>= 0.2) { verdict='🟡 WEAK BUY';   verdictColor='var(--yellow)'; verdictSub='매수 우위, 확인 필요'; }
  else if (finalScore>=-0.2) { verdict='⏳ NEUTRAL';     verdictColor='var(--text2)';  verdictSub='방향 불명확, 관망'; }
  else if (finalScore>=-0.8) { verdict='🟡 WEAK SELL';  verdictColor='var(--orange)'; verdictSub='매도 우위, 주의'; }
  else if (finalScore>=-1.5) { verdict='📉 SELL';        verdictColor='var(--red2)';   verdictSub='매도 지표 우세'; }
  else                       { verdict='🚨 STRONG SELL'; verdictColor='var(--red)';    verdictSub='대부분 지표 매도 신호'; }

  const target   = atr ? price + atr*2.0 : null;
  const stopLoss = atr ? price - atr*1.0 : null;
  const entryZones = calcEntryZones(ohlcv, atr, ema9, ema20, bb, finalScore);

  // ── 전설 트레이더 의견 ──────────────────
  const legends = [];

  if (ema9&&ema20&&ema50) {
    const allUp=price>ema9&&ema9>ema20&&ema20>ema50;
    const allDn=price<ema9&&ema9<ema20&&ema20<ema50;
    const ab200=ema200!=null?price>ema200:null;
    const sc=allUp&&ab200===true?2:allUp?1.8:allDn&&ab200===false?-2:allDn?-1.8:price>ema50?0.8:-0.8;
    legends.push({ name:'Jesse Livermore', tool:'추세 추종 / EMA',
      opinion: allUp&&ab200===true  ?'완벽 정배열 + 200MA 위. 지금이 최고의 매수 조건이다 — 추세에 올라타라'
        : allUp&&ab200===false?'단기 정배열이나 200MA 아래. 반등 가능하나 큰 그림은 약세'
        : allUp   ?'완벽한 정배열. 추세에 올라타라 — 매수 조건 충족'
        : allDn&&ab200===false?'역배열 + 200MA 붕괴. 추세를 거스르지 마라 — 절대 진입 금지'
        : allDn   ?'완전 역배열. 추세를 거스르지 마라 — 절대 진입 금지'
        : price>ema50?'중기 추세는 살아있다. 눌림목에서 기회를 잡아라'
        : '중기 추세 아래. 리스크가 크다, 관망하라', sc });
  }

  if (macd) {
    const sc=macd.hist>0&&macd.rising?2:macd.hist>0?0.5:macd.hist<0&&!macd.rising?-2:-0.3;
    legends.push({ name:'Gerald Appel', tool:'MACD',
      opinion: macd.hist>0&&macd.rising?'모멘텀 상승 확장 중. 매수 진입 적기다 — 추세가 살아있다'
        : macd.hist>0?'상승 중이나 모멘텀이 약해지고 있다. 보수적으로 접근하라'
        : macd.hist<0&&!macd.rising?'하락 추세 지속 중. 절대로 저점 잡기 시도하지 마라'
        : '하락 감소 중. 반등 초기 징후이나 아직 확신 없음', sc });
  }

  if (rsi!=null) {
    const r=Math.round(rsi);
    const sc=r>=70?-1.5:r<=30?1.5:r>=55?0.5:-0.2;
    legends.push({ name:'Welles Wilder', tool:'RSI (14)',
      opinion: r>=70?`RSI ${r} — 과매수 구간이다. 지금 사면 고점 매수, 위험하다`
        : r<=30?`RSI ${r} — 극단 과매도. 반등 준비 구간, 소량 분할 진입 고려`
        : r>=55?`RSI ${r} — 상승 모멘텀 유지. 추세 타는 중`
        : `RSI ${r} — 방향성 탐색 중. 확인 후 진입`, sc });
  }

  if (bb) {
    const sc=bb.pct<=0.05?2:bb.pct<=0.2?1:bb.pct>=0.95?-2:bb.pct>=0.8?-1:0;
    legends.push({ name:'John Bollinger', tool:'볼린저 밴드',
      opinion: bb.pct<=0.05?'밴드 하단 이탈 — 강한 반등 가능. 역발상 매수 고려하라'
        : bb.pct<=0.20?'밴드 하단 근처 — 과매도 반등 구간. 소량 진입 고려'
        : bb.pct>=0.95?'밴드 상단 이탈 — 과매수, 지금 사지 마라'
        : bb.pct>=0.80?'밴드 상단 근처 — 차익 실현을 고려할 시점'
        : '밴드 중간 구간 — 특별한 신호 없음', sc });
  }

  if (wr!=null) {
    const w=Math.round(wr);
    const sc=w>=-20?-1.5:w<=-80?1.5:w<=-60?0.5:0;
    legends.push({ name:'Larry Williams', tool:'Williams %R',
      opinion: w>=-20?`%R ${w} — 과매수 영역이다. 단기 조정 올 수 있다`
        : w<=-80?`%R ${w} — 과매도 극단. 반등 임박 가능성 높다`
        : w<=-60?`%R ${w} — 저점권 진입. 관심 구간`
        : `%R ${w} — 중립 구간, 방향 확인 필요`, sc });
  }

  if (volR!=null) {
    const sc=volR>=1.5&&price>=prevClose?1.5:volR>=1.5?-1.5:0;
    legends.push({ name:"William O'Neil", tool:'CAN SLIM 거래량',
      opinion: volR>=1.5&&price>=prevClose
        ? `거래량 ${volR.toFixed(1)}배 + 상승 — 기관 매수 확인. 진입 조건 충족`
        : volR>=1.5&&price<prevClose
        ? `거래량 ${volR.toFixed(1)}배 + 하락 — 기관 매도 압력. 위험하다`
        : volR<0.7
        ? `거래량 부족 (${volR.toFixed(1)}x) — 신호 신뢰도 낮다, 확인 필요`
        : `거래량 보통 (${volR.toFixed(1)}x) — 추가 확인 후 진입`, sc });
  }

  return { inds, legends, finalScore, norm, verdict, verdictColor, verdictSub,
           atr, target, stopLoss, entryZones, volR };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UTILS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function $id(id) { return document.getElementById(id); }
function setTxt(id,v) { const e=$id(id); if(e) e.textContent=v; }

function fmtChg(price,prev) {
  if (!price||!prev) return {chg:'-',pct:'-',cls:'c-muted'};
  const d=price-prev, p=d/prev*100, cls=d>=0?'c-green glow-green':'c-red glow-red';
  return { chg:(d>=0?'+':'')+d.toFixed(2), pct:(p>=0?'+':'')+p.toFixed(2)+'%', cls };
}

function scoreColor(sc) {
  return sc>= 1?'var(--green)':sc>=0.2?'var(--yellow)':sc>=-0.2?'var(--text3)':sc>=-1?'var(--orange)':'var(--red)';
}

function legendScoreDisplay(sc) {
  const norm=Math.round((sc+2)/4*100); // 0~100
  const label=sc>= 1.5?'BULL+':sc>= 0.8?'BULL':sc>= 0.2?'BULL-':sc>=-0.2?'NEUT':sc>=-0.8?'BEAR-':sc>=-1.5?'BEAR':'BEAR+';
  const bg=sc>= 1?'rgba(0,232,122,0.15)':sc>= 0.2?'rgba(255,208,0,0.15)':sc>=-0.2?'rgba(90,144,112,0.1)':sc>=-1?'rgba(255,119,0,0.15)':'rgba(255,34,68,0.15)';
  const col=scoreColor(sc);
  return { norm, label, bg, col };
}

let _toastT;
function showToast(msg) {
  const el=$id('toast');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(_toastT);
  _toastT=setTimeout(()=>el.classList.remove('on'),3200);
}

function setLoading(ticker,on) {
  setTxt('loadTicker', ticker||'----');
  $id('overlay').classList.toggle('on',on);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CHIP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function pick(el, ticker) {
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  $id('tInput').value = ticker;
  run();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MAIN RUN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function run() {
  const raw = $id('tInput').value.trim().toUpperCase();
  if (!raw) return;

  $id('runBtn').disabled = true;
  $id('result').classList.remove('on');
  setLoading(raw, true);

  try {
    const ohlcv = await fetchOHLCV(raw);
    if (!ohlcv || !ohlcv.price) {
      showToast(`⚠ ${raw} DATA FETCH FAILED — CHECK TICKER`);
      return;
    }

    const { chg, pct, cls } = fmtChg(ohlcv.price, ohlcv.prevClose);
    const isCoin = raw.startsWith('KRW-');
    const fmt    = isCoin
      ? v => Math.round(v).toLocaleString('ko-KR') + '원'
      : v => v.toLocaleString(undefined, { maximumFractionDigits: 2 });

    const sig = calcSignal(ohlcv);

    // ── 가격 카드 ──
    setTxt('rLabel', raw);
    const priceEl=$id('rPrice'); if(priceEl){priceEl.textContent=fmt(ohlcv.price); priceEl.className='price-num '+cls;}
    const chgEl=$id('rChg'); if(chgEl){chgEl.textContent=`PREV ${chg}`; chgEl.className='price-chg '+cls;}
    const pctEl=$id('rPct'); if(pctEl){pctEl.textContent=pct; pctEl.className='price-pct '+cls;}

    // 거래량
    if (sig.volR!=null) {
      const vrEl=$id('rVol');
      if(vrEl){
        vrEl.textContent=sig.volR.toFixed(1)+'x';
        vrEl.className='vol-num '+(sig.volR>=1.5?(ohlcv.price>=ohlcv.prevClose?'c-green':'c-red'):'c-muted');
      }
      setTxt('rVolNote', sig.volR>=2?'VOL SPIKE':sig.volR>=1.5?'VOL HIGH':sig.volR<0.7?'VOL LOW':'VOL AVG');
    } else { setTxt('rVol','-'); setTxt('rVolNote',''); }

    // top bar 색
    const card=$id('priceCard');
    if(card) card.style.setProperty('--topbar-color',
      sig.finalScore>=0.2?'var(--green)':sig.finalScore<=-0.2?'var(--red)':'var(--yellow)');

    // 종합 점수
    const scEl=$id('rScore');
    if(scEl){scEl.textContent=sig.norm; scEl.style.color=sig.verdictColor; scEl.className='score-mini-num '+(sig.norm>=65?'glow-green':sig.norm<=35?'glow-red':'glow-yellow');}
    const sbar=$id('rScoreBar');
    if(sbar){sbar.style.width=sig.norm+'%'; sbar.style.background=sig.norm>=65?'var(--green)':sig.norm>=50?'var(--yellow)':sig.norm>=35?'var(--orange)':'var(--red)';}
    const vEl=$id('rVerdict');
    if(vEl){vEl.textContent=sig.verdict; vEl.style.color=sig.verdictColor;}
    setTxt('rVerdictSub', sig.verdictSub);

    // ── 진입 추천가 ──
    const entryEl=$id('rEntryList');
    if(entryEl) entryEl.innerHTML = sig.entryZones.map(z=>`
      <div class="entry-item ${z.cls}">
        <div class="entry-tag">${z.tag}</div>
        <div class="entry-price">${fmt(z.price)}</div>
        <div class="entry-reason">${z.reason}</div>
      </div>`).join('');

    // ── 목표가/손절 ──
    if(sig.target&&sig.stopLoss>0) {
      setTxt('rTarget', fmt(sig.target));
      setTxt('rTargetPct', `+${((sig.target/ohlcv.price-1)*100).toFixed(1)}%`);
      setTxt('rStop', fmt(sig.stopLoss));
      setTxt('rStopPct', `-${((1-sig.stopLoss/ohlcv.price)*100).toFixed(1)}%`);
    } else {
      setTxt('rTarget','데이터 부족'); setTxt('rTargetPct','');
      setTxt('rStop','데이터 부족');  setTxt('rStopPct','');
    }

    // ── 기술 지표 ──
    const indEl=$id('rInds');
    if(indEl) indEl.innerHTML = sig.inds.map(ind=>{
      const bc=scoreColor(ind.sc);
      const bw=Math.round((ind.sc+2)/4*100);
      return `<div class="ind-row">
        <div class="ind-name">${ind.name}</div>
        <div class="ind-val" style="color:${bc}">${ind.val}</div>
        <div class="ind-bar"><div class="ind-bar-bg"><div class="ind-bar-fill" style="width:${bw}%;background:${bc}"></div></div></div>
        <div class="ind-sig">${ind.sig}</div>
      </div>`;
    }).join('');

    // ── 전설 트레이더 ──
    const legEl=$id('rLegends');
    if(legEl) legEl.innerHTML = sig.legends.map(leg=>{
      const bc  = scoreColor(leg.sc);
      const icon= leg.sc>=1.5?'🔥':leg.sc>=0.5?'📈':leg.sc>=-0.5?'🟡':leg.sc>=-1.5?'📉':'🚨';
      const sd  = legendScoreDisplay(leg.sc);
      const norm100 = sd.norm; // 0~100 표시
      return `<div class="legend-card" style="border-left-color:${bc}">
        <div class="legend-hdr">
          <span class="legend-icon">${icon}</span>
          <span class="legend-name">${leg.name}</span>
          <span class="legend-tool">${leg.tool}</span>
          <span class="legend-score-badge" style="background:${sd.bg};color:${sd.col}">${norm100}</span>
        </div>
        <div class="legend-opinion">${leg.opinion}</div>
      </div>`;
    }).join('');

    $id('result').classList.add('on');
    // 결과 위치로 스크롤
    setTimeout(()=>$id('result').scrollIntoView({behavior:'smooth',block:'start'}), 80);
    showToast(`✓ ${raw} ANALYSIS COMPLETE`);

  } catch(e) {
    showToast(`⚠ ERROR — ${e.message||'UNKNOWN'}`);
    console.error(e);
  } finally {
    $id('runBtn').disabled = false;
    setLoading('', false);
  }
}
</script>
